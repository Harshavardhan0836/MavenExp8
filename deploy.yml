---
- name: Deploy Maven Artifact
  hosts: localhost
  become: yes

  tasks:

    - name: Ensure deployment directory exists
      file:
        path: /home/admin1/deployment
        state: directory
        mode: '0755'

    - name: Copy artifact
      copy:
        src: /var/lib/jenkins/workspace/HelloMaven-CI/target/HelloMaven-1.0-SNAPSHOT.jar
        dest: /home/YOUR_USERNAME/deployment/HelloMaven.jar
        remote_src: yes